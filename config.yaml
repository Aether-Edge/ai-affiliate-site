# ============================================================
#  サイト設定ファイル  ―― ここだけ書き換えれば運用できます
# ============================================================

site:
  title: "ポータブル電源・防災ガジェット比較ナビ"
  description: "ポータブル電源・ソーラーパネル・防災グッズを実データで徹底比較。最新モデルとセール情報を毎日更新。"
  # GitHub Pages のURL（独自ドメインなら https://example.com）
  base_url: "https://YOUR_GITHUB_USERNAME.github.io/ai-affiliate-site"
  author: "運営者名"
  lang: "ja"

# ============================================================
#  ニッチ（ジャンル）設定 ―― 自動生成のテーマを決める核
# ============================================================
niche:
  theme: "ポータブル電源・ソーラーパネル・防災ガジェットの比較とレビュー"
  audience: "災害対策やキャンプ・車中泊のためにポータブル電源を検討している日本の個人"
  seed_keywords:
    - "ポータブル電源 おすすめ 比較"
    - "Jackery EcoFlow 比較"
    - "ポータブル電源 容量 選び方"
    - "防災 ポータブル電源 必要か"
    - "ソーラーパネル 充電 効率"
    - "車中泊 ポータブル電源"
    - "ポータブル電源 寿命 リン酸鉄"
    - "停電対策 家庭用 蓄電"

# ============================================================
#  収益化設定 ―― 各IDを自分のものに置き換える
# ============================================================
monetization:
  adsense_client: "ca-pub-XXXXXXXXXXXXXXXX"   # AdSense パブリッシャーID
  adsense_auto_ads: true
  amazon_tag: "yourtag-22"                     # Amazonアソシエイト トラッキングID
  rakuten_affiliate_id: ""                     # 楽天アフィリエイトID
  show_affiliate_disclaimer: true

# ============================================================
#  AI生成の設定
# ============================================================
generation:
  provider: "gemini"            # gemini / openai / anthropic
  model: "gemini-2.0-flash"     # 環境変数 AI_MODEL でも上書き可
  use_web_grounding: true       # Google検索でファクトを補強（geminiのみ）
  min_words: 1800
  posts_per_run: 1
  temperature: 0.7
